effects = cas:colorCorrection:vibrance:fxaa

# Sharpening - CAS
casSharpness = 0.4

# Color - more vivid without looking fake
colorCorrectionSaturation = 1.4
colorCorrectionContrast = 1.15
colorCorrectionBrightness = 0.98
colorCorrectionGamma = 0.95
colorCorrectionRed = 1.0
colorCorrectionGreen = 0.98
colorCorrectionBlue = 1.02

# Vibrance
vibranceSaturation = 0.5

# FXAA - smooths jaggies, cheap cost
fxaaQualitySubpix = 0.75
fxaaQualityEdgeThreshold = 0.125
fxaaQualityEdgeThresholdMin = 0.0625
