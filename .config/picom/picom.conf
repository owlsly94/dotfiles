# ╔═══════════════════════════════════════════════════════════════╗
# ║                        picom.conf                             ║
# ║          Hyprland-like animations & effects for Xmonad        ║
# ╚═══════════════════════════════════════════════════════════════╝
#
# Requires: picom (pijulius fork recommended for animations)
# Install:  yay -S picom-pijulius-git
# Place at: ~/.config/picom/picom.conf
#           or pass with: picom --config ~/.config/picom/picom.conf


#──────────────────────────────────────────────────────────────────
# BACKEND
#──────────────────────────────────────────────────────────────────
# glx gives the best performance and animation smoothness.
# Use "xrender" if you have issues with glx.
backend = "glx";
use-damage = true;
vsync = true;


#──────────────────────────────────────────────────────────────────
# SHADOWS  (Hyprland drop-shadow equivalent)
#──────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'xmobar'",
    "class_g = 'Rofi'",
    "_GTK_FRAME_EXTENTS@",
    "_NET_WM_STATE *= '_NET_WM_STATE_HIDDEN'"
];


#──────────────────────────────────────────────────────────────────
# FADING  (smooth opacity transitions like Hyprland)
#──────────────────────────────────────────────────────────────────
fading = true;
fade-in-step  = 0.03;
fade-out-step = 0.03;
fade-delta    = 4;

fade-exclude = [
    "class_g = 'slop'"   # no fade on screenshot selection
];


#──────────────────────────────────────────────────────────────────
# TRANSPARENCY / OPACITY
#──────────────────────────────────────────────────────────────────
# Inactive windows get a slight dim — mirrors Hyprland's dim_inactive
active-opacity   = 1.0;
inactive-opacity = 0.92;
frame-opacity    = 1.0;
inactive-opacity-override = false;

# Dim inactive windows (0.0 = no dim, 1.0 = fully black)
# Hyprland default is around 0.05–0.1
inactive-dim = 0.06;

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Google-chrome'",
    "100:class_g = 'mpv'",
    "100:class_g = 'vlc'",
    "100:class_g = 'steam'",
    "100:class_g = 'steam_app'",
    "100:fullscreen",
    "95:class_g  = 'kitty' && focused",
    "85:class_g  = 'kitty' && !focused",
    "95:class_g  = 'Alacritty' && focused",
    "85:class_g  = 'Alacritty' && !focused",
    "95:class_g  = 'Code' && focused",
    "90:class_g  = 'Code' && !focused",
    "95:class_g  = 'Rofi'"
];


#──────────────────────────────────────────────────────────────────
# BLUR  (Hyprland blur equivalent — requires glx backend)
#──────────────────────────────────────────────────────────────────
blur-background = true;
blur-method = "dual_kawase";   # closest to Hyprland's blur algo
blur-strength = 6;             # 1–20; Hyprland default feels ~6–8
blur-background-exclude = [
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "class_g = 'xmobar'",
    "_GTK_FRAME_EXTENTS@"
];


#──────────────────────────────────────────────────────────────────
# ROUNDED CORNERS  (Hyprland rounding equivalent)
#──────────────────────────────────────────────────────────────────
corner-radius = 10;
rounded-corners-exclude = [
    "class_g = 'xmobar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_NET_WM_STATE *= '_NET_WM_STATE_FULLSCREEN'"
];


#──────────────────────────────────────────────────────────────────
# ANIMATIONS  (requires pijulius fork of picom)
# Mimics Hyprland's windowsIn/Out/Move animations
#──────────────────────────────────────────────────────────────────
animations = true;

# Window open animation — like Hyprland's "slide" + "popin"
animation-for-open-window = "zoom";        # zoom in from center
animation-for-unmap-window = "zoom";       # zoom out on close
animation-for-transient-window = "slide-up";

# Workspace switch — mimics Hyprland workspaces animation
animation-for-workspace-switch-in  = "slide-right";
animation-for-workspace-switch-out = "slide-left";

# Speeds — Hyprland default bezier "myBezier" 0.05 0.9 0.1 1.05
# picom uses milliseconds
animation-stiffness-in-tag    = 125;
animation-stiffness-tag-change = 90;

animation-window-mass       = 0.4;
animation-dampening         = 22;
animation-clamping          = true;

# Per-type overrides
animation-for-menu-window      = "slide-down";
animation-for-popup-menu       = "slide-down";
animation-for-dropdown-menu    = "slide-up";


#──────────────────────────────────────────────────────────────────
# WINDOW TYPE RULES
#──────────────────────────────────────────────────────────────────
wintypes:
{
    tooltip        = { fade = true; shadow = false; opacity = 0.92; focus = true; full-shadow = false; };
    dock           = { shadow = false; clip-shadow-above = true; };
    dnd            = { shadow = false; };
    popup_menu     = { opacity = 0.95; shadow = true; };
    dropdown_menu  = { opacity = 0.95; shadow = true; };
    notification   = { shadow = true; fade = true; };
    splash         = { shadow = false; };
    utility        = { focus = false; shadow = false; };
    dialog         = { shadow = true; };
    normal         = { shadow = true; };
};


#──────────────────────────────────────────────────────────────────
# PERFORMANCE TWEAKS
#──────────────────────────────────────────────────────────────────
# Mark windows that have no overlap as non-redirected for performance
mark-wmwin-focused    = true;
mark-ovredir-focused  = true;
detect-rounded-corners = true;
detect-client-opacity  = true;
detect-transient       = true;
detect-client-leader   = true;

# Disable for fullscreen to let games run unthrottled
# (xmonad.hs already kills picom on fullscreen, but this is a safety net)
unredir-if-possible = true;
unredir-if-possible-exclude = [
    "class_g = 'Firefox'",
    "class_g = 'Google-chrome'"
];
