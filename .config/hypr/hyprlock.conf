# BACKGROUND
background {
    monitor = 
    path = /home/owlsly/.config/wallpapers/1218246.png
    blur_passes = 3 # Increased for a smoother "glass" look
    blur_size = 7
    contrast = 0.89
    brightness = 0.4
    vibrancy = 0.2
    vibrancy_darkness = 0.1
}

# GENERAL
general {
    no_fade_in = false 
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25 
    dots_spacing = 0.3
    dots_center = true
    
    outer_color = rgba(bb9af7ee) 
    inner_color = rgba(24283bee) 
    font_color = rgb(c0caf5)     
    
    fade_on_empty = true
    placeholder_text = <span foreground="##c0caf5"><i>Password...</i></span>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
    
    # Slick border glow effect
    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(122, 162, 247, 1) 
    font_family = JetBrains Mono Nerd Font ExtraBold
    font_size = 180
    position = 0, 320
    halign = center
    valign = center
}

# Minute-Time 
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(192, 202, 245, 1) 
    font_family = JetBrains Mono Nerd Font ExtraBold
    font_size = 180
    position = 0, 100
    halign = center
    valign = center
}

# Day-Date-Month 
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B')"
    color = rgba(187, 154, 247, 1) 
    font_size = 22
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, -50
    halign = center
    valign = center
}

# User Label 
label {
    monitor =
    text =   $USER
    color = rgba(192, 202, 245, 0.7)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, -210
    halign = center
    valign = center
}
